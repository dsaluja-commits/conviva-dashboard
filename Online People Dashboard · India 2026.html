/* ─────────────────────────────────────────
   CONVIVA BRAND TOKENS
───────────────────────────────────────── */
:root {
  --green:      #91C63E;
  --green-dk:   #6FA02E;
  --green-lt:   #B8D97A;
  --green-bg:   #F3F9E8;
  --green-mid:  #D4ECAC;
  --charcoal:   #2C2E2D;
  --charcoal-2: #3D4040;
  --charcoal-3: #555857;
  --white:      #FFFFFF;
  --off-white:  #F8F9F5;
  --bg:         #F0F2EB;
  --border:     #DDE2D3;
  --border-lt:  #ECF0E5;
  --muted:      #8A9080;
  --text:       #2C2E2D;
  --sub:        #555857;
  --red:        #D63B3B;
  --red-bg:     #FDF0F0;
  --orange:     #E07B2A;
  --orange-bg:  #FDF3EB;
  --yellow:     #C8A820;
  --yellow-bg:  #FDFAEB;
  --teal:       #2A9D8F;
  --teal-bg:    #EBF7F5;
  --shadow-sm:  0 1px 3px rgba(44,46,45,0.08);
  --shadow-md:  0 4px 16px rgba(44,46,45,0.10);
  --shadow-lg:  0 8px 32px rgba(44,46,45,0.14);
}

/* ─────────────────────────────────────────
   RESET + BASE
───────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:13px;
  line-height:1.5;
}
button { font-family:'Poppins',sans-serif; cursor:pointer; }
input  { font-family:'Poppins',sans-serif; }

/* ─────────────────────────────────────────
   TOPBAR
───────────────────────────────────────── */
.topbar {
  position:sticky; top:0; z-index:300;
  height:66px;
  background:#FFFFFF;
  border-bottom:3px solid var(--green);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 36px;
  box-shadow:0 1px 8px rgba(44,46,45,0.08);
}

/* Conviva logo */
.cv-logo { display:flex; align-items:center; }

.topbar-sep {
  width:1px; height:26px;
  background:var(--border);
  margin:0 20px;
}
.topbar-tag {
  font-size:11px; font-weight:500;
  color:var(--muted);
  letter-spacing:0.08em; text-transform:uppercase;
}
